<script>
    function solution(money) {
        let count = 0; // 음료수 개수
        while(money > 0){
            console.log(`음료수 = ${count}개, 잔돈 = ${money}원`)
            count += 1
            money -= 5500;
        }
        let arr = [];
        if(count > 0){
            arr.push(count-1);
            arr.push(money+5500);
        }else{
            arr.push(count);
            arr.push(money);
        }
        // let arr = [count-1, money+5500];
        return arr;
    }
    var result = solution(5500);
    console.log(result);
    var result = solution(15000);
    console.log(result);







</script>
