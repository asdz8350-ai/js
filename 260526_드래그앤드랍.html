<script>
    // /// 디스트럭쳐링 문법 (TMI)
    // let [a1, a2, a3] = [100, 200, 300];

    // let img = document.querySelector('img');
    let dragElem = null; // 현재 드래그 중인 요소를 저장해둘 변수
    let sections = document.querySelectorAll('section');

    // let bgs = [...sections].map(s => getComputedStyle(sections).backgroundColor);



    let bgs = []; // section의 기본 배경색을 저장하는 배열
    // 처음 시작 시 section 들의 기본 배경색을 전부 가져와서 bgs에 넣기
    // for(let i = 0; i < sections.length; i++){ 1번
    for(let s of sections){
        let c = getComputedStyle(s).backgroundColor;
        bgs.push(c);
    }
    // 모든 section에게 동일한 동작을 부여하기
    for(let i = 0; i < sections.length; i++) {
        let section = sections[i];

        section.draggable = true;
        // section ('나')가 드래그 시작했을 때
        section.ondragstart = () => {
            dragElem = section; // 현재 드래그 중인 요소를 '나'로 변경함
        }
        section.ondragend = () => {
            for(let j = 0; j < sections.length; j++) {
                sections[j].style.backgroundColor = bgs[j];
            }
        }
        // 드래그 중에 마우스가 내 안에 들어왔을 때
        section.ondragenter = () => {
            // 내 배경 색을 현재 드래그 중인 요소의 색으로 변경함
            section.style.backgroundColor = getComputedStyle(dragElem).backgroundColor;
        }
    }
