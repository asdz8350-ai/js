        for(let i = 0; i < sections.length; i++) {
            sections[i].style.backgroundColor = originalBgs[i];
        }

            if(key === keys[i]){
                // 해당 section만 색을 변경한다.
                sections[i].style.backgroundColor = changeBgs[i];
            }
